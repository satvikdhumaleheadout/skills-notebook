<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills Notebook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" />

  <style>
    /* ── Reset ─────────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design Tokens ─────────────────────────────────────────────────────────── */
    :root {
      --bg:            #F7F8FA;
      --surface:       #FFFFFF;
      --surface-2:     #F9FAFB;
      --border:        #E5E7EB;
      --border-2:      #D1D5DB;
      --primary:       #6366F1;
      --primary-hover: #4F46E5;
      --primary-light: #EEF2FF;
      --primary-text:  #4338CA;
      --text:          #111827;
      --text-2:        #6B7280;
      --text-3:        #9CA3AF;
      --green:         #10B981;
      --green-bg:      #ECFDF5;
      --yellow:        #D97706;
      --yellow-bg:     #FFFBEB;
      --red:           #DC2626;
      --red-bg:        #FEF2F2;
      --sidebar-w:     240px;
      --header-h:      56px;
      --radius-sm:     6px;
      --radius:        10px;
      --radius-lg:     14px;
      --shadow-sm:     0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
      --shadow:        0 4px 16px rgba(0,0,0,0.07);
      --shadow-lg:     0 10px 30px rgba(0,0,0,0.1);
    }

    /* ── Base ──────────────────────────────────────────────────────────────────── */
    html, body, #root { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── App Shell ─────────────────────────────────────────────────────────────── */
    .app-shell { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ───────────────────────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: sticky;
      top: 0;
      overflow-y: auto;
      scrollbar-width: none;
      transition: width 0.2s ease, min-width 0.2s ease;
      overflow-x: hidden;
    }
    .sidebar::-webkit-scrollbar { display: none; }
    .sidebar.collapsed {
      width: 48px;
      min-width: 48px;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 18px 16px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      white-space: nowrap;
    }
    .sidebar-logo:hover { background: var(--bg); }
    .sidebar.collapsed .sidebar-logo { justify-content: center; padding: 18px 0 14px; gap: 0; }
    .sidebar-logo-icon { font-size: 20px; flex-shrink: 0; }
    .sidebar-logo-text {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      letter-spacing: -0.3px;
      transition: opacity 0.15s;
    }
    .sidebar.collapsed .sidebar-logo-text { display: none; }

    .sidebar-nav { padding: 8px 8px 20px; flex: 1; }
    .sidebar.collapsed .sidebar-nav { padding: 8px 4px 20px; }

    .sidebar-nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13.5px;
      color: var(--text-2);
      font-weight: 500;
      transition: all 0.1s;
      white-space: nowrap;
    }
    .sidebar-nav-item:hover { background: var(--bg); color: var(--text); }
    .sidebar-nav-item.active { background: var(--primary-light); color: var(--primary-text); font-weight: 600; }
    .sidebar-nav-icon { font-size: 14px; opacity: 0.7; flex-shrink: 0; }
    .sidebar.collapsed .sidebar-nav-item { justify-content: center; gap: 0; padding: 8px 4px; }
    .sidebar.collapsed .sidebar-nav-label { display: none; }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
      padding: 14px 10px 4px;
      white-space: nowrap;
    }
    .sidebar.collapsed .sidebar-section-label { display: none; }

    .sidebar-skill-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      color: var(--text-2);
      font-weight: 500;
      transition: all 0.1s;
      white-space: nowrap;
    }
    .sidebar-skill-item:hover { background: var(--bg); color: var(--text); }
    .sidebar-skill-item.active { background: var(--primary-light); color: var(--primary-text); font-weight: 600; }
    .sidebar.collapsed .sidebar-skill-item { justify-content: center; gap: 0; padding: 8px 4px; }
    .sidebar.collapsed .sidebar-skill-name { display: none; }
    .sidebar-skill-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .sidebar-skill-soon {
      margin-left: auto;
      font-size: 9px;
      font-weight: 600;
      background: var(--bg);
      color: var(--text-3);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 1px 5px;
    }
    .sidebar.collapsed .sidebar-skill-soon { display: none; }

    .sidebar-skill-runs-link {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px 3px 25px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 11.5px;
      color: var(--text-3);
      font-weight: 500;
      transition: all 0.1s;
      white-space: nowrap;
    }
    .sidebar-skill-runs-link:hover { background: var(--bg); color: var(--text-2); }
    .sidebar-skill-runs-link.active { color: var(--primary-text); font-weight: 600; }
    .sidebar.collapsed .sidebar-skill-runs-link { display: none; }

    .sidebar-toggle-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 10px 0;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--text-3);
      font-size: 13px;
      border-top: 1px solid var(--border);
      transition: color 0.1s, background 0.1s;
      font-family: inherit;
      flex-shrink: 0;
    }
    .sidebar-toggle-btn:hover { color: var(--text); background: var(--bg); }

    /* ── Main Content ──────────────────────────────────────────────────────────── */
    .main-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      min-width: 0;
    }
    .main-content.no-scroll {
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Home Hub ──────────────────────────────────────────────────────────────── */
    .page-home {
      padding: 40px 44px;
      max-width: 1280px;
    }
    .home-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .home-title {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .home-subtitle {
      font-size: 15px;
      color: var(--text-2);
      margin-bottom: 32px;
    }
    .home-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .home-controls-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-2);
      margin-right: 4px;
    }
    .view-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-2);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.1s;
      font-family: inherit;
    }
    .view-btn:hover { border-color: var(--border-2); color: var(--text); }
    .view-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }

    /* Skill Grid */
    .skill-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .skill-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 22px;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
    }
    .skill-card:hover {
      border-color: var(--border-2);
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }
    .skill-card.coming-soon { cursor: default; opacity: 0.7; }
    .skill-card.coming-soon:hover { transform: none; box-shadow: none; border-color: var(--border); }
    .skill-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .skill-card-icon { font-size: 26px; }
    .skill-card-cat {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 100px;
      border: 1px solid;
    }
    .skill-card-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.2px;
    }
    .skill-card-desc {
      font-size: 12.5px;
      color: var(--text-2);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .skill-card-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .skill-card-meta {
      font-size: 11px;
      color: var(--text-3);
    }

    /* Graph */
    .graph-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      position: relative;
    }
    .skill-graph { width: 100%; display: block; }
    .graph-hint {
      position: absolute;
      bottom: 16px;
      right: 16px;
      font-size: 11px;
      color: var(--text-3);
    }

    /* ── Skill Page ────────────────────────────────────────────────────────────── */
    .skill-page {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .skill-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 24px 40px 0;
      flex-shrink: 0;
    }
    .skill-breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-3);
      margin-bottom: 12px;
    }
    .skill-breadcrumb a {
      color: var(--text-2);
      cursor: pointer;
      text-decoration: none;
    }
    .skill-breadcrumb a:hover { color: var(--primary); }
    .skill-breadcrumb-sep { color: var(--border-2); }
    .skill-header-top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }
    .skill-header-icon { font-size: 30px; }
    .skill-header-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.4px;
    }
    .skill-header-desc {
      font-size: 13px;
      color: var(--text-2);
      margin-top: 2px;
      max-width: 640px;
    }
    .skill-tabs {
      display: flex;
      gap: 0;
      margin-top: 4px;
    }
    .skill-tab {
      padding: 10px 18px;
      cursor: pointer;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text-2);
      border-bottom: 2px solid transparent;
      transition: all 0.1s;
      white-space: nowrap;
      user-select: none;
    }
    .skill-tab:hover { color: var(--text); }
    .skill-tab.active {
      color: var(--primary-text);
      border-bottom-color: var(--primary);
      font-weight: 600;
    }
    .skill-tab-content {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .skill-tab-content.scrollable {
      overflow-y: auto;
      padding: 32px 40px;
    }

    /* ── Overview Tab ──────────────────────────────────────────────────────────── */
    .overview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
      max-width: 900px;
    }
    .overview-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .overview-card-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 10px;
    }
    .overview-card h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .overview-card p {
      font-size: 13px;
      color: var(--text-2);
      line-height: 1.6;
    }
    .io-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .io-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12.5px;
      color: var(--text);
    }
    .io-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .connected-skills { display: flex; flex-wrap: wrap; gap: 8px; }
    .connected-skill-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
    }
    .connected-skill-chip:hover { border-color: var(--primary); background: var(--primary-light); color: var(--primary-text); }

    /* ── Runs ──────────────────────────────────────────────────────────────────── */
    .runs-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .runs-panel {
      width: 320px;
      min-width: 320px;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .runs-panel-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .version-select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      outline: none;
    }
    .version-select:focus { border-color: var(--primary); }

    .runs-list { flex: 1; }
    .run-card {
      padding: 14px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
      border-left: 3px solid transparent;
    }
    .run-card:hover { background: var(--bg); }
    .run-card.selected {
      background: var(--primary-light);
      border-left-color: var(--primary);
    }
    .run-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }
    .run-card-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }
    .run-card-meta {
      font-size: 11px;
      color: var(--text-3);
      margin-bottom: 6px;
    }
    .run-card-root-cause {
      font-size: 11.5px;
      color: var(--text-2);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Score badges */
    .score-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 7px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .score-high { background: var(--green-bg); color: #059669; }
    .score-mid  { background: var(--yellow-bg); color: var(--yellow); }
    .score-low  { background: var(--red-bg); color: var(--red); }

    /* Run Viewer */
    .runs-viewer-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }
    .viewer-fullscreen-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .viewer-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-shrink: 0;
    }
    .viewer-header-left { min-width: 0; }
    .viewer-run-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .viewer-run-meta {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 2px;
    }
    .viewer-header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .viewer-tabs {
      display: flex;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .viewer-tab {
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.1s;
      white-space: nowrap;
    }
    .viewer-tab:hover { color: var(--text); }
    .viewer-tab.active { color: var(--primary-text); border-bottom-color: var(--primary); font-weight: 600; }
    .viewer-body {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .viewer-iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .viewer-markdown {
      height: 100%;
      overflow-y: auto;
      padding: 28px 32px;
    }
    .viewer-no-run {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-3);
      text-align: center;
      gap: 10px;
    }
    .viewer-no-run-icon { font-size: 36px; }
    .viewer-no-run-title { font-size: 15px; font-weight: 600; color: var(--text-2); }
    .viewer-no-run-desc { font-size: 13px; max-width: 300px; line-height: 1.5; }

    /* ── Comments ──────────────────────────────────────────────────────────────── */
    .comments-section {
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      max-height: 380px;
      overflow-y: auto;
    }
    .comments-section-inner { padding: 20px 24px; }
    .comments-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .comments-title { font-size: 13px; font-weight: 700; color: var(--text); }
    .comments-count {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-2);
      padding: 1px 7px;
    }
    .comment-form { margin-bottom: 20px; }
    .comment-form-fields {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .input-name {
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 12.5px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      outline: none;
      width: 160px;
      flex-shrink: 0;
    }
    .input-name:focus { border-color: var(--primary); }
    .input-text {
      flex: 1;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 12.5px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      outline: none;
      resize: none;
    }
    .input-text:focus { border-color: var(--primary); }
    .comment-form-actions { display: flex; justify-content: flex-end; }

    .comments-list { display: flex; flex-direction: column; gap: 0; }
    .comment-thread { border-top: 1px solid var(--border); padding: 12px 0; }
    .comment-thread:first-child { border-top: none; }
    .comment-row { display: flex; gap: 10px; }
    .comment-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--primary-light);
      color: var(--primary-text);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .comment-avatar.sm { width: 22px; height: 22px; font-size: 9px; }
    .comment-body { flex: 1; min-width: 0; }
    .comment-meta {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 3px;
    }
    .comment-author { font-size: 12.5px; font-weight: 600; color: var(--text); }
    .comment-time { font-size: 11px; color: var(--text-3); }
    .comment-text { font-size: 12.5px; color: var(--text); line-height: 1.5; }
    .comment-actions { display: flex; gap: 8px; margin-top: 4px; }
    .comment-action-btn {
      font-size: 11.5px;
      color: var(--text-3);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
    }
    .comment-action-btn:hover { color: var(--primary); }
    .comment-replies { margin-top: 10px; padding-left: 18px; border-left: 2px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
    .reply-form { margin-top: 8px; }
    .reply-form-fields { display: flex; gap: 6px; margin-bottom: 6px; }
    .reply-form-actions { display: flex; gap: 6px; justify-content: flex-end; }

    /* ── Tree View ─────────────────────────────────────────────────────────────── */
    .tree-outer {
      position: relative;
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .tree-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .tree-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .tree-hint { font-size: 12px; color: var(--text-3); }
    .tree-node-count {
      font-size: 11px;
      font-weight: 600;
      background: #f0fdf4;
      color: #15803d;
      border: 1px solid #bbf7d0;
      border-radius: 100px;
      padding: 2px 8px;
    }
    .tree-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: #FAFBFC;
    }
    .tree-canvas-inner {
      position: absolute;
      top: 0;
      left: 0;
    }
    .tree-node {
      position: absolute;
      width: 248px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.15s;
    }
    .tree-node:hover { border-color: var(--border-2); box-shadow: var(--shadow-sm); }
    .tree-node.selected { z-index: 2; }
    .tree-node.dimmed { opacity: 0.3; }
    .tree-node-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .tree-node-icon { font-size: 13px; flex-shrink: 0; }
    .tree-node-label { font-size: 11.5px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .tree-node-sub { font-size: 10px; color: var(--text-3); margin-bottom: 5px; }
    .tree-node-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      background: #f0fdf4;
      color: #166534;
      border: 1px solid #bbf7d0;
      border-radius: 3px;
      padding: 1px 5px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .tree-node-io { font-size: 9.5px; color: var(--text-3); line-height: 1.4; }
    .tree-node-io span { color: var(--text-2); }

    .tree-side-panel {
      width: 380px;
      min-width: 380px;
      border-left: 1px solid var(--border);
      background: var(--surface);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .tree-panel-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }
    .tree-panel-title { font-size: 14px; font-weight: 700; color: var(--text); }
    .tree-panel-sub { font-size: 11.5px; color: var(--text-2); margin-top: 2px; }
    .tree-panel-body { padding: 16px; display: flex; flex-direction: column; gap: 16px; }
    .panel-section {}
    .panel-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 6px;
    }
    .panel-condition {
      font-size: 11.5px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      white-space: pre-wrap;
      color: var(--text);
      line-height: 1.5;
    }
    .panel-desc {
      font-size: 12.5px;
      color: var(--text);
      line-height: 1.65;
    }
    .chip-row { display: flex; flex-wrap: wrap; gap: 5px; }
    .chip {
      font-size: 10.5px;
      padding: 2px 7px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--text-2);
      background: var(--surface-2);
    }
    .chip-in { background: #EFF6FF; border-color: #BFDBFE; color: #1D4ED8; }
    .chip-out { background: #F0FDF4; border-color: #BBF7D0; color: #166534; }
    .panel-markdown { font-size: 12px; line-height: 1.7; color: var(--text); }
    .panel-markdown h1, .panel-markdown h2, .panel-markdown h3 {
      font-size: 13px; font-weight: 700; margin: 12px 0 6px; color: var(--text);
    }
    .panel-markdown p { margin-bottom: 8px; }
    .panel-markdown pre { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px; overflow-x: auto; font-size: 11px; margin-bottom: 8px; }
    .panel-markdown code { font-size: 11px; background: var(--bg); padding: 1px 4px; border-radius: 3px; }
    .panel-markdown table { font-size: 11px; border-collapse: collapse; width: 100%; margin-bottom: 8px; }
    .panel-markdown th, .panel-markdown td { border: 1px solid var(--border); padding: 4px 8px; text-align: left; }
    .panel-markdown th { background: var(--bg); font-weight: 600; }
    .panel-markdown ul, .panel-markdown ol { padding-left: 16px; margin-bottom: 8px; }
    .panel-markdown li { margin-bottom: 3px; }

    .zoom-controls {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 10;
    }
    .zoom-btn {
      width: 28px; height: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.1s;
      font-family: inherit;
    }
    .zoom-btn:hover { background: var(--bg); color: var(--text); }

    .tree-legend {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      z-index: 10;
    }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 10.5px; color: var(--text-2); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    /* ── Markdown Body (changelog, transcript, etc.) ─────────────────────────── */
    .markdown-body {
      font-size: 13.5px;
      line-height: 1.7;
      color: var(--text);
      max-width: 860px;
    }
    .markdown-body h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.4px; margin: 24px 0 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .markdown-body h2 { font-size: 17px; font-weight: 700; margin: 22px 0 10px; }
    .markdown-body h3 { font-size: 14px; font-weight: 700; margin: 18px 0 8px; }
    .markdown-body h4 { font-size: 13px; font-weight: 600; margin: 14px 0 6px; }
    .markdown-body p { margin-bottom: 12px; }
    .markdown-body ul, .markdown-body ol { padding-left: 20px; margin-bottom: 12px; }
    .markdown-body li { margin-bottom: 5px; }
    .markdown-body strong { font-weight: 600; }
    .markdown-body em { font-style: italic; }
    .markdown-body code {
      font-size: 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: 'SFMono-Regular', Consolas, monospace;
    }
    .markdown-body pre {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      overflow-x: auto;
      margin-bottom: 14px;
    }
    .markdown-body pre code { background: none; border: none; padding: 0; font-size: 12px; }
    .markdown-body table { border-collapse: collapse; width: 100%; margin-bottom: 16px; font-size: 13px; }
    .markdown-body th { background: var(--bg); font-weight: 600; padding: 7px 10px; border: 1px solid var(--border); }
    .markdown-body td { padding: 7px 10px; border: 1px solid var(--border); }
    .markdown-body blockquote {
      border-left: 3px solid var(--primary);
      padding: 8px 16px;
      margin: 12px 0;
      color: var(--text-2);
      background: var(--primary-light);
      border-radius: 0 6px 6px 0;
    }
    .markdown-body a { color: var(--primary); text-decoration: none; }
    .markdown-body a:hover { text-decoration: underline; }
    .markdown-body hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    /* ── Buttons ───────────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.1s;
      font-family: inherit;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn:hover { background: var(--bg); border-color: var(--border-2); }
    .btn-primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-icon { padding: 6px 8px; }

    /* ── Status & Category badges ──────────────────────────────────────────────── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
    }
    .status-active { background: var(--green-bg); color: #059669; }
    .status-coming-soon { background: var(--bg); color: var(--text-3); border: 1px solid var(--border); }

    /* ── Utilities ─────────────────────────────────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
      color: var(--text-3);
      gap: 8px;
    }
    .empty-state-icon { font-size: 32px; }
    .empty-state-title { font-size: 14px; font-weight: 600; color: var(--text-2); }
    .empty-state-desc { font-size: 12.5px; max-width: 280px; line-height: 1.5; }

    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: var(--text-3);
      font-size: 13px;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #111827;
      color: #fff;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      z-index: 9999;
      box-shadow: var(--shadow-lg);
      animation: toast-in 0.2s ease;
    }
    @keyframes toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Scrollbar ─────────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- CDN Libraries -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/build/highlight.min.js"></script>

  <!-- CVR-RCA Decision Tree data (NODES, EDGES, TYPE_META, SECTION_LABELS, FILE_CONTENTS) -->
  <script src="/part2.js"></script>

  <!-- App -->
  <script type="text/babel" src="/js/main.js"></script>
</body>
</html>
